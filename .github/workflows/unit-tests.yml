name: unit tests

on:
  push:
    branches:
      - main

jobs:
  perform-unit-tests:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - uses: actions/checkout@v5

      # Install .NET SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x

      # Perform unit tests
      - name: Perform unit tests
        run: dotnet test --project MD2RazorGenerator.Test --output detailed
      - name: Perform unit tests for build
        run: dotnet test --project MD2RazorGenerator.Build.Test --output detailed